<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <!-- We're using local fonts or standard system fonts to ensure it works completely offline, but we'll include a fallback for a modern look -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="calculator-container">
        <div class="calculator-card">
            <header>
                <h1>Tip Calculator</h1>
                <p>Calculate tips easily and offline.</p>
            </header>

            <form id="tip-form" novalidate>
                <div class="input-group">
                    <label for="bill-amount">Total Bill Amount</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="bill-amount" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="tip-percentage">Tip Percentage</label>
                    <div class="select-wrapper">
                        <select id="tip-percentage" required>
                            <option value="10">10%</option>
                            <option value="15" selected>15%</option>
                            <option value="18">18%</option>
                            <option value="20">20%</option>
                            <option value="25">25%</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="number-of-people">Number of People</label>
                    <input type="number" id="number-of-people" placeholder="1" min="1" value="1" required>
                </div>

                <button type="submit" id="calculate-btn">Calculate</button>
            </form>

            <!-- Results Container -->
            <div id="result" class="result-container" aria-live="polite">
                <!-- Results or errors will be injected here dynamically -->
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
